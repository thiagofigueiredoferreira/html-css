<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alinhamento e Altura de Linha</title>
    <style>
        p {
            font-size: 24px; /* aumentando o tamanho da fonte para evidenciar o alinhamento e a altura de linha */
            /*text-align:center ; */
           /* text-align: right;*/
           text-align: justify;/*alinhamento justificado, onde o texto é alinhado tanto à esquerda quanto à direita, criando um efeito de bloco. Isso é comumente usado em textos longos para melhorar a legibilidade e a estética.*/

           line-height: 1.5;/*controla a altura de linha, ou seja, o espaço vertical entre as linhas de texto. O valor 1.5 significa que a altura de linha será 1.5 vezes o tamanho da fonte, proporcionando um espaçamento mais confortável entre as linhas e melhorando a legibilidade do texto.*/
            
        }
    </style>
</head>
<body>
    <h1>Titulo</h1>
    <p>Lorem ipsum, dolor sit amet consectetur adipisicing elit. Incidunt cum eaque autem nobis consectetur fugiat saepe adipisci consequuntur dignissimos quibusdam <mark>consequatur</mark> in aliquam, suscipit unde obcaecati. Unde fugit error repellendus.</p>
</body>
</html>
