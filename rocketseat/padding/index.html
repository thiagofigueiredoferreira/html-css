<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Padding</title>
    <style>
        div, span {
            width: 200px;
            height: 100px;
            border: solid 1px black;
        }
        .padding {
            padding: 20px 40px 0 10px;
        }
        /* regra do padding para nao mudar o tamanho do elemento 
        .padding {
            box-sizing: border-box;
        }
        */
    </style>
</head>
<body>
    <div class="padding">block</div>
    <span class="padding">inline</span>
</body>
</html>
