<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>display: inline</title>
    <style>
        span{
            border: solid;
        }

    </style>
</head>
<body>
    <span>Texto 1</span>
    <span>Texto 2</span>
    

    <!--
    1. Ocupa apenas o espaço necessário para seu conteúdo.
    2. Permite que outros elementos fiquem na mesma linha.
    3. width e height não funcionam.
    4. Aplicamos apenas os valores horizontais de margin e padding e border.
    -->
</body>
</html>
