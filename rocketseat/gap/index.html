<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>gap</title>
<style>
            /*FILHOS DO CONTANINER*/

        /* GAP CHEAT SHEET
            -----------------------------------------------------------------------
            O que faz: Define o espaçamento entre itens (gutters) em containers 
            Flexbox, Grid e Multi-column layouts.

            Sintaxe: 
            gap: [row-gap] [column-gap];

            Valores comuns:
            - gap: 20px;          (20px em todos os lados entre os itens)
            - gap: 10px 30px;     (10px vertical / 30px horizontal)
            - row-gap: 15px;      (apenas entre linhas)
            - column-gap: 15px;   (apenas entre colunas)

            Vantagens:
            - Não adiciona espaço nas bordas externas do container (diferente de margin).
            - Funciona nativamente no Flexbox (substituindo o antigo "negative margin hack").
            -----------------------------------------------------------------------
*/
                        

        #app {

            display: grid;
            grid-template-areas:
            "header header header" 
            "main main aside"
            "footer footer footer";
            height: 100vh;
            gap: 40px;
            padding: 40px;
            box-sizing: border-box;

        }

        #app > * {

            border: 1px solid red;
        }

       

        #app header {
            grid-area: header;

        }

        #app main {
            grid-area: main;
        }
        

         #app footer {
            grid-area: footer;
          
        }

    </style>
   
</head>
<body>
     <div id="app">
       <header>1</header>
       <main>2</main>
       <aside>3</aside>
       <footer>4</footer>
    </div>
    
</body>
</html>
