<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi Linnhas</title>
    <style>
        .container {
           
            height: 50vh;
            display: flex;
        }
        .item {
            flex-basis:230px ; /* flex-basis define o tamanho inicial do item no flexbox 
antes dele crescer ou diminuir */
        }
    </style>
</head>
<body>
      <style>
        .container {
            border: dashed;

        }
        .item {
            --hue: 0;
            text-align: center;
            background-color: hsl(var(--hue), 100%, 70%);

        }
    </style>
    <div class="container">
          <div class="item"  style= "--hue:0">1</div>
          <div class="item"  style="--hue:100">2</div>
          <div class="item"  style="--hue:200">3</div>
          <div class="item"  style="--hue:300">4</div>
           <div class="item"  style= "--hue:0">5</div>
          <div class="item"  style="--hue:100">6</div>
          <div class="item"  style="--hue:200">7</div>
          <div class="item"  style="--hue:300">8</div>
    </div>

</body>
</html>
