<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid Area</title>
<style>
            /*FILHOS DO CONTANINER*/


                        /* GRID TEMPLATE AREAS: O "Mapa" do Layout 
            1. No Pai (Container): Desenha a estrutura com nomes entre aspas.
            2. Nos Filhos: Associa o elemento ao nome usando 'grid-area'.
            Obs: Cada área deve formar um retângulo perfeito. Use "." para espaços vazios.
            */

        #app {

            display: grid;
            grid-template-areas:
            "header header header" 
            "main main aside"
            "footer footer footer";
            height: 100vh;
        }

        #app > * {

            border: 1px solid red;
        }

       

        #app header {
            grid-area: header;

        }

        #app main {
            grid-area: main;
        }
        

         #app footer {
            grid-area: footer;
          
        }

    </style>
   
</head>
<body>
     <div id="app">
       <header>1</header>
       <main>2</main>
       <aside>3</aside>
       <footer>4</footer>
    </div>
    
</body>
</html>
