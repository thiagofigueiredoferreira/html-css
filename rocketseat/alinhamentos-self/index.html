<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alinhamentos Items</title>
    <style>

       
        * {
            margin: 0;
            box-sizing: border-box;
        }


        .grid {
            display: grid;
            grid-template-columns: repeat(3, 100px);
            grid-template-rows: repeat(3, 100px);
            gap: 8px;

           
     
            height: 100vh;
            width: 100vw;
            background-color: black;
        }

        .grid > div {
            background-color: #4b9cc7;
        }

        .grid > div:nth-child(2) {
            /* align-self: end; alinha este elemento específico no final do eixo Y */
            /* align-self: end; */
            /* justify-self: center; centraliza este elemento específico no eixo X */
            /* justify-self: center; */

            /* place-self: center; centraliza este elemento específico em ambos os eixos */
            place-self: center;
        }



    </style>
</head>
<body>

    <div class="grid">
       <div>a</div>
        <div>b</div>
        <div>c</div>
        <div>d</div>
        <div>e</div>
        <div>f</div>
        <div>g</div>
        <div>h</div>
        <div>i</div>
    </div>
    
</body>
</html>
