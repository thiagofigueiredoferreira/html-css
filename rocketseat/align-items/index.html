<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>align-items</title>
    <style>
        .container {
            display: flex; 
            height: 50vh; /*tamanho da altura do container*/
            flex-direction: column;
            /* align-items: stretch; por padrao ele ja fica esticado ate o final do conteiner  */
            /* align-items: flex-start; deixa alinhado no topo na esquerda */
            /* align-items:center; foca no centro em horizontal */
            /* align-items: flex-end; fica alinhado no final do containe do lado esquerdo */
            /* align-items: baseline; os itens estao alinhados na linha base do texto,uma linha que fica no meio do conteudo. */
            /* align-items: stretch; alinha os itens horizontal */

            
            

        }
    </style>
</head>
<body>
    
    
    <style>
        .container {
            border: dashed;
        }
        .item {
            --hue: 0;
            text-align: center;
            background-color: hsl(var(--hue), 100%, 70%);
            width: 20px;
        }
    </style>
    <div class="container">
          <div class="item"  style="--hue:0">1</div>
          <div class="item"  style="--hue:100">2</div>
          <div class="item"  style="--hue:200">3</div>
          <div class="item"  style="--hue:300">4</div>
    </div>


</body>
</html>
