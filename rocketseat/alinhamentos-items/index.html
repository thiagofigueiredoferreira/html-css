<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alinhamentos Items</title>
    <style>

       
        * {
            margin: 0;
            box-sizing: border-box;
        }


        .grid {
            display: grid;
            grid-template-columns: repeat(3, 100px);
            grid-template-rows: repeat(3, 100px);
            gap: 8px;

             /* align-items trabalha o eixo Y */

            /* align-items: start; isso faz que com todos os elementos fiquem ao topo */
            /* align-items: center; os elementos ficam todos no centro de cada items */
            /* align-items: end; todos os elementos ficam na parte de baixo dos items */

            /* justify-items trabalha no eixo x */

            /* justify-items: start; alinha os itens no início do eixo x */
            /* justify-items: center; centraliza os itens no eixo x */
            /* justify-items: end; alinha os itens no final do eixo x */

            /* place-items trabalha com os dois ao mesmo tempo */


            /* place-items: end; alinha os itens no final de ambos os eixos */
            /* place-items: center; centraliza os itens em ambos os eixos */
            /* place-items: start; alinha os itens no início de ambos os eixos */




     
            height: 100vh;
            width: 100vw;
            background-color: black;
        }

        .grid > div {
            background-color: #4b9cc7;
        }

    </style>
</head>
<body>

    <div class="grid">
       <div>a</div>
        <div>b</div>
        <div>c</div>
        <div>d</div>
        <div>e</div>
        <div>f</div>
        <div>g</div>
        <div>h</div>
        <div>i</div>
    </div>
    
</body>
</html>
